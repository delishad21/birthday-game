<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adventure Maze Painter</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #15120f;
      --panel: #221b16;
      --panel-edge: #594535;
      --text: #f8ead8;
      --muted: #c8ad91;
      --accent: #f3b45e;
      --wall: #17110d;
      --path: #f7d795;
      --outline: #72d9f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(243, 180, 94, 0.16), transparent 32rem),
        linear-gradient(135deg, #0c0a09 0%, var(--bg) 55%, #27180e 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    button,
    textarea {
      font: inherit;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 920px) minmax(18rem, 1fr);
      gap: 1rem;
      width: min(1400px, 100%);
      margin: 0 auto;
      padding: 1rem;
    }

    .panel {
      border: 1px solid var(--panel-edge);
      border-radius: 18px;
      background: rgba(34, 27, 22, 0.92);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
      padding: 1rem;
    }

    h1,
    h2 {
      margin: 0 0 0.75rem;
      letter-spacing: 0.02em;
    }

    h1 {
      color: #ffe0a9;
      font-size: clamp(1.7rem, 3vw, 2.6rem);
    }

    h2 {
      color: #f5cf9d;
      font-size: 1.2rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    button {
      border: 1px solid #8f6b42;
      border-radius: 999px;
      background: #37261a;
      color: var(--text);
      cursor: pointer;
      padding: 0.55rem 0.85rem;
    }

    button:hover,
    button[aria-pressed="true"] {
      background: var(--accent);
      color: #1c1209;
    }

    .canvas-wrap {
      overflow: auto;
      border: 1px solid #4c382b;
      border-radius: 14px;
      background: #0d0a08;
      padding: 0.5rem;
    }

    #maze-canvas {
      display: block;
      width: 100%;
      max-width: 880px;
      height: auto;
      image-rendering: pixelated;
      touch-action: none;
    }

    .io-grid {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.35rem;
      color: var(--muted);
      font-weight: 700;
    }

    textarea {
      min-height: 13rem;
      resize: vertical;
      border: 1px solid #5c4635;
      border-radius: 12px;
      background: #120f0d;
      color: #ffe9c7;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.2;
      padding: 0.75rem;
      white-space: pre;
    }

    #status {
      min-height: 1.5rem;
      margin: 0;
      color: #9de8ff;
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel" aria-labelledby="painter-title">
      <h1 id="painter-title">Adventure Maze Painter</h1>
      <div class="toolbar" aria-label="Painting tools">
        <button type="button" data-tool="horizontal" aria-pressed="true">Left/right path: 3 rows</button>
        <button type="button" data-tool="vertical" aria-pressed="false">Up/down path: 2 columns</button>
        <button type="button" data-tool="wall" aria-pressed="false">Erase to wall</button>
        <button type="button" id="reset-button">Reset blocked</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="maze-canvas" width="880" height="760" tabindex="0" aria-label="Adventure maze grid"></canvas>
      </div>
    </section>

    <section class="panel" aria-labelledby="data-title">
      <h2 id="data-title">Maze Data</h2>
      <div class="io-grid">
        <label>
          Export
          <textarea id="export-output" readonly spellcheck="false"></textarea>
        </label>
        <button type="button" id="copy-button">Copy export</button>
        <label>
          Import
          <textarea id="import-input" spellcheck="false" placeholder="Paste 38 rows of 44 . or # characters"></textarea>
        </label>
        <button type="button" id="import-button">Import maze</button>
        <p id="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script>
/* CORE_START */
const columns = 44;
const rows = 38;
const openCell = '.';
const wallCell = '#';

const cloneMatrix = (matrix) => matrix.map((row) => [...row]);
const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

const createBlockedMatrix = () => Array.from({ length: rows }, () => Array.from({ length: columns }, () => wallCell));

const openCellAt = (matrix, col, row) => {
  if (row >= 0 && row < rows && col >= 0 && col < columns) {
    matrix[row][col] = openCell;
  }
};

const paintHorizontalPath = (matrix, col, row) => {
  const next = cloneMatrix(matrix);
  const startRow = clamp(row - 1, 0, rows - 3);
  for (let pathRow = startRow; pathRow < startRow + 3; pathRow += 1) {
    openCellAt(next, col, pathRow);
  }
  return next;
};

const paintVerticalPath = (matrix, col, row) => {
  const next = cloneMatrix(matrix);
  const startCol = clamp(col, 0, columns - 2);
  for (let pathCol = startCol; pathCol < startCol + 2; pathCol += 1) {
    openCellAt(next, pathCol, row);
  }
  return next;
};

const setWall = (matrix, col, row) => {
  const next = cloneMatrix(matrix);
  if (row >= 0 && row < rows && col >= 0 && col < columns) {
    next[row][col] = wallCell;
  }
  return next;
};

const serializeMatrix = (matrix) => {
  const lines = [];
  for (let row = 0; row < rows; row += 1) {
    let line = '';
    for (let col = 0; col < columns; col += 1) {
      line += matrix[row]?.[col] === openCell ? openCell : wallCell;
    }
    lines.push(line);
  }
  return lines.join('\n');
};

const parseMatrix = (source) => {
  const lines = source
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean);
  if (lines.length !== rows) {
    throw new Error(`Expected ${rows} rows, got ${lines.length}`);
  }
  return lines.map((line, index) => {
    if (line.length !== columns) {
      throw new Error(`Expected row ${index + 1} to have ${columns} columns, got ${line.length}`);
    }
    const cells = [...line];
    const invalid = cells.find((cell) => cell !== openCell && cell !== wallCell);
    if (invalid) {
      throw new Error(`Invalid character "${invalid}" on row ${index + 1}`);
    }
    return cells;
  });
};

globalThis.__adventureMazePainterCore = {
  columns,
  rows,
  createBlockedMatrix,
  paintHorizontalPath,
  paintVerticalPath,
  setWall,
  serializeMatrix,
  parseMatrix,
};
/* CORE_END */

const core = globalThis.__adventureMazePainterCore;
const canvas = document.querySelector('#maze-canvas');
const context = canvas.getContext('2d');
const exportOutput = document.querySelector('#export-output');
const importInput = document.querySelector('#import-input');
const status = document.querySelector('#status');
const toolButtons = [...document.querySelectorAll('[data-tool]')];
const resetButton = document.querySelector('#reset-button');
const copyButton = document.querySelector('#copy-button');
const importButton = document.querySelector('#import-button');
const cellWidth = canvas.width / core.columns;
const cellHeight = canvas.height / core.rows;

let activeTool = 'horizontal';
let isPainting = false;
let matrix = core.createBlockedMatrix();
let cursorCell = { col: 0, row: 0 };

const setStatus = (message) => {
  status.textContent = message;
};

const updateExport = () => {
  exportOutput.value = core.serializeMatrix(matrix);
};

const drawLabel = (text, x, y) => {
  context.save();
  context.font = '700 14px Georgia, serif';
  context.textBaseline = 'top';
  const width = context.measureText(text).width + 14;
  context.fillStyle = 'rgba(13, 10, 8, 0.78)';
  context.fillRect(x, y, width, 24);
  context.strokeStyle = 'rgba(114, 217, 247, 0.9)';
  context.strokeRect(x, y, width, 24);
  context.fillStyle = '#d9f8ff';
  context.fillText(text, x + 7, y + 5);
  context.restore();
};

const drawOverlays = () => {
  context.save();
  context.lineWidth = 3;
  context.strokeStyle = 'rgba(114, 217, 247, 0.95)';
  context.setLineDash([8, 5]);

  const entranceX = (core.columns - 2) * cellWidth;
  const entranceY = Math.floor(core.rows / 2 - 2) * cellHeight;
  context.strokeRect(entranceX, entranceY, cellWidth * 2, cellHeight * 4);
  drawLabel('Right entrance', entranceX - 126, entranceY + 8);

  const starSize = 6;
  const starX = (core.columns / 2 - starSize / 2) * cellWidth;
  const starY = (core.rows / 2 - starSize / 2) * cellHeight;
  context.strokeStyle = 'rgba(243, 180, 94, 0.95)';
  context.strokeRect(starX, starY, cellWidth * starSize, cellHeight * starSize);
  drawLabel('Center star area', starX + 8, starY + 8);

  context.restore();
};

const drawKeyboardCursor = () => {
  context.save();
  context.lineWidth = 4;
  context.strokeStyle = '#ffffff';
  context.setLineDash([5, 3]);
  context.strokeRect(
    cursorCell.col * cellWidth + 3,
    cursorCell.row * cellHeight + 3,
    cellWidth - 6,
    cellHeight - 6,
  );
  context.lineWidth = 2;
  context.strokeStyle = '#1b0f08';
  context.setLineDash([]);
  context.strokeRect(
    cursorCell.col * cellWidth + 6,
    cursorCell.row * cellHeight + 6,
    cellWidth - 12,
    cellHeight - 12,
  );
  context.restore();
};

const drawMaze = () => {
  context.clearRect(0, 0, canvas.width, canvas.height);
  for (let row = 0; row < core.rows; row += 1) {
    for (let col = 0; col < core.columns; col += 1) {
      context.fillStyle = matrix[row][col] === '.' ? '#f7d795' : '#17110d';
      context.fillRect(col * cellWidth, row * cellHeight, cellWidth, cellHeight);
    }
  }

  context.strokeStyle = 'rgba(89, 69, 53, 0.42)';
  context.lineWidth = 1;
  for (let col = 0; col <= core.columns; col += 1) {
    const x = Math.round(col * cellWidth) + 0.5;
    context.beginPath();
    context.moveTo(x, 0);
    context.lineTo(x, canvas.height);
    context.stroke();
  }
  for (let row = 0; row <= core.rows; row += 1) {
    const y = Math.round(row * cellHeight) + 0.5;
    context.beginPath();
    context.moveTo(0, y);
    context.lineTo(canvas.width, y);
    context.stroke();
  }

  drawOverlays();
  drawKeyboardCursor();
};

const render = () => {
  drawMaze();
  updateExport();
};

const canvasCellFromEvent = (event) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    col: Math.floor((event.clientX - rect.left) * scaleX / cellWidth),
    row: Math.floor((event.clientY - rect.top) * scaleY / cellHeight),
  };
};

const applyToolAt = (col, row) => {
  if (activeTool === 'horizontal') {
    matrix = core.paintHorizontalPath(matrix, col, row);
  } else if (activeTool === 'vertical') {
    matrix = core.paintVerticalPath(matrix, col, row);
  } else {
    matrix = core.setWall(matrix, col, row);
  }
  render();
};

const paintAt = (event) => {
  const { col, row } = canvasCellFromEvent(event);
  cursorCell = {
    col: clamp(col, 0, core.columns - 1),
    row: clamp(row, 0, core.rows - 1),
  };
  applyToolAt(cursorCell.col, cursorCell.row);
};

toolButtons.forEach((button) => {
  button.addEventListener('click', () => {
    activeTool = button.dataset.tool;
    toolButtons.forEach((item) => item.setAttribute('aria-pressed', String(item === button)));
    setStatus(`Tool selected: ${button.textContent}`);
  });
});

canvas.addEventListener('pointerdown', (event) => {
  isPainting = true;
  canvas.setPointerCapture(event.pointerId);
  paintAt(event);
});

canvas.addEventListener('pointermove', (event) => {
  if (isPainting) {
    paintAt(event);
  }
});

const stopPainting = () => {
  isPainting = false;
};

canvas.addEventListener('pointerup', stopPainting);
canvas.addEventListener('pointercancel', stopPainting);
canvas.addEventListener('pointerleave', stopPainting);

canvas.addEventListener('keydown', (event) => {
  const nextCursor = { ...cursorCell };
  if (event.key === 'ArrowLeft') {
    nextCursor.col = clamp(nextCursor.col - 1, 0, core.columns - 1);
  } else if (event.key === 'ArrowRight') {
    nextCursor.col = clamp(nextCursor.col + 1, 0, core.columns - 1);
  } else if (event.key === 'ArrowUp') {
    nextCursor.row = clamp(nextCursor.row - 1, 0, core.rows - 1);
  } else if (event.key === 'ArrowDown') {
    nextCursor.row = clamp(nextCursor.row + 1, 0, core.rows - 1);
  } else if (event.key === ' ' || event.key === 'Enter') {
    event.preventDefault();
    applyToolAt(cursorCell.col, cursorCell.row);
    setStatus(`Painted row ${cursorCell.row + 1}, column ${cursorCell.col + 1}.`);
    return;
  } else {
    return;
  }

  event.preventDefault();
  cursorCell = nextCursor;
  drawMaze();
  setStatus(`Cursor row ${cursorCell.row + 1}, column ${cursorCell.col + 1}.`);
});

resetButton.addEventListener('click', () => {
  matrix = core.createBlockedMatrix();
  render();
  setStatus('Reset to a fully blocked maze.');
});

copyButton.addEventListener('click', async () => {
  if (navigator.clipboard?.writeText) {
    try {
      await navigator.clipboard.writeText(exportOutput.value);
      setStatus('Export copied to clipboard.');
      return;
    } catch {
      exportOutput.select();
      setStatus('Clipboard blocked. Matrix selected for manual copy.');
      return;
    }
  }
  exportOutput.select();
  setStatus('Clipboard unavailable; export text selected.');
});

importButton.addEventListener('click', () => {
  try {
    matrix = core.parseMatrix(importInput.value);
    render();
    setStatus('Maze imported.');
  } catch (error) {
    setStatus(error.message);
  }
});

render();
setStatus('Ready.');
  </script>
</body>
</html>
